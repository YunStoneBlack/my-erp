<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>상품 목록</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>상품 목록</h1>

    <form id="product-form">
      <input type="text" id="input-name" placeholder="상품 이름" required>
      <input type="number" id="input-price" placeholder="가격" min="0" required>
      <input type="number" id="input-stock" placeholder="재고 수량" min="0" required>
      <button type="submit">추가</button>
    </form>

    <table id="product-table">
      <thead>
        <tr>
          <th>상품 이름</th>
          <th>가격</th>
          <th>재고 수량</th>
          <th>관리</th>
        </tr>
      </thead>
      <tbody id="product-body">
      </tbody>
    </table>
  </div>

  <script src="script.js"></script>
</body>
</html>
